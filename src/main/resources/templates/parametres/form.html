<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::section})}">

<body>
    <section style="max-width: 600px; margin: 0 auto;">
        <div class="glass-card" style="padding: 40px;">
            <div style="margin-bottom: 30px; border-bottom: 1px solid var(--glass-border); padding-bottom: 20px;">
                <h2 style="font-family: 'Outfit'; font-size: 1.8rem;">Configuration des Seuils de Décision</h2>
                <p style="color: var(--text-muted); font-size: 0.9rem;">Définition des règles critiques par matière</p>
            </div>

            <form th:action="@{/parametres/enregistrer}" th:object="${parametre}" method="post">
                <input type="hidden" th:field="*{id}">

                <div class="form-group">
                    <label>Matière concernée</label>
                    <select th:field="*{matiere.id}" required>
                        <option th:each="m : ${matieres}" th:value="${m.id}" th:text="${m.nom}"></option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Opérateur Logique</label>
                    <select th:field="*{operateur.id}" required>
                        <option th:each="op : ${operateurs}" th:value="${op.id}" th:text="${op.operateur}"></option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Valeur du Seuil de Différence</label>
                    <input type="number" step="0.1" th:field="*{seuil}" placeholder="Ex: 4.0" required>
                </div>

                <div class="form-group">
                    <label>Type de Résolution (Min/Max/Moyenne)</label>
                    <select th:field="*{resolution.id}" required>
                        <option th:each="res : ${resolutions}" th:value="${res.id}" th:text="${res.nom}"></option>
                    </select>
                </div>

                <div style="margin-top: 40px; display: flex; gap: 15px;">
                    <button type="submit" class="primary-btn" style="flex: 1;">
                        <i class="fas fa-sliders-h" style="margin-right: 8px;"></i> Confirmer la Règle
                    </button>
                    <a th:href="@{/parametres}" class="btn-outline-primary"
                        style="text-decoration: none; display: flex; align-items: center; justify-content: center; padding: 0 24px;">
                        Annuler
                    </a>
                </div>
            </form>
        </div>
    </section>
</body>

</html>
