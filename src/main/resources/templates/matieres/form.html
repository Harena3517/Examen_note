<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::section})}">

<body>
    <section style="max-width: 600px; margin: 0 auto;">
        <div class="glass-card" style="padding: 40px;">
            <div style="margin-bottom: 30px; border-bottom: 1px solid var(--glass-border); padding-bottom: 20px;">
                <h2 style="font-family: 'Outfit'; font-size: 1.8rem;"
                    th:text="${matiere.id == null ? 'Nouvelle Discipline' : 'Édition de la Discipline'}"></h2>
                <p style="color: var(--text-muted); font-size: 0.9rem;">Configuration de l'enseignement</p>
            </div>

            <form th:action="@{/matieres/enregistrer}" th:object="${matiere}" method="post">
                <input type="hidden" th:field="*{id}">

                <div class="form-group">
                    <label>Intitulé de la Matière</label>
                    <input type="text" th:field="*{nom}" placeholder="Ex: Mathématiques" required>
                </div>

                <div style="margin-top: 40px; display: flex; gap: 15px;">
                    <button type="submit" class="primary-btn" style="flex: 1;">
                        <i class="fas fa-book" style="margin-right: 8px;"></i> Enregistrer la Matière
                    </button>
                    <a th:href="@{/matieres}" class="btn-outline-primary"
                        style="text-decoration: none; display: flex; align-items: center; justify-content: center; padding: 0 24px;">
                        Annuler
                    </a>
                </div>
            </form>
        </div>
    </section>
</body>

</html>
